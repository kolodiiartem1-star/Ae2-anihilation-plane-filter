name: Build AE2 Whitelist Mod

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Java 8 (required for 1.7.10 / Forge)
      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 8

      # Step 3: Compile the Java file
      - name: Compile Java
        run: |
          mkdir -p build/classes
          javac -d build/classes src/main/java/com/example/ae2whitelist/AE2AnnihilationWhitelist.java

      # Step 4: Create the jar
      - name: Create jar
        run: |
          mkdir -p build/jar
          jar cf build/jar/AE2WhitelistMod-1.0.jar -C build/classes com

      # Step 5: Upload the jar artifact
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: AE2WhitelistMod
          path: build/jar/AE2WhitelistMod-1.0.jar
